{% load static %}
<!doctype html>
<html lang="es">
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Imprimir QRs</title>

<link rel="stylesheet"
      href="{% static 'css/genericas/print.css' %}">

<style>
:root{
    --label-width-mm: {{ label_width_mm|default:110 }}mm;
    --label-height-mm: {{ label_height_mm|default:50 }}mm;
}
</style>

</head>
<body>
  <div class="screen-actions">
    <button class="action-btn" onclick="window.print()">Imprimir</button>
    <a class="action-btn" href="{% url 'listaLotes' orden_pk=orden_pk pk=pedido.idpedido %}">Regresar a lotes</a>
  </div>

  <main>
    {% for qr in qr_images %}
      <section class="qr-print-sheet">
        <img src="data:image/png;base64,{{ qr.data }}" alt="{{ qr.name }}">
      </section>
    {% endfor %}
  </main>
</body>
</html>
