{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8" />
    <title>{{ area }} - Trex</title>
    <link rel="stylesheet" href="{% static 'css/genericas/base.css' %}" />
    <link rel="stylesheet" href="{% static 'css/administrador/listados.css' %}">
    <link rel="stylesheet" href="{% static 'css/empleados/empaquetado.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Pathway+Gothic+One&display=swap" rel="stylesheet" />
</head>
<body>
<nav class="navbar">
    <div class="navbar-container">
        <div class="navbar-logo">
            <img src="{% static 'images/LOGO_TREX.jpg' %}" alt="Logo">
        </div>
        <div class="login-nav">
            <ul>
                <li><a href="{% url 'login' %}">Iniciar Sesión</a></li>
            </ul>
        </div>
    </div>
</nav>

<div class="sidebar">
    <ul>
        <li><a href="{% url 'home' %}"><i class="fa-solid fa-house"></i> Regresar</a></li>
    </ul>
</div>

<main class="page">
    <section class="center-area">
        <div id="subtitle">EMPAQUETADO</div>

        

        <form method="post" class="form-card">
            {% csrf_token %}

            <div class="form-group">
                <label for="orden_id">Orden:</label>
                <select id="orden_id" name="orden_id" class="form-control" required>
                    <option value="">Selecciona una orden</option>
                    {% for orden in ordenes %}
                        <option value="{{ orden.idordendepedido }}" {% if selected_orden_id == orden.idordendepedido|stringformat:'s' %}selected{% endif %}>
                            {{ orden.numeroorden }} - {{ orden.idcliente.nombre }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <div class="form-group">
                <label for="pedido_id">Pedido:</label>
                <select id="pedido_id" name="pedido_id" class="form-control" required>
                    <option value="">Selecciona un pedido</option>
                    {% for pedido in pedidos %}
                        <option
                            value="{{ pedido.idpedido }}"
                            data-orden="{{ pedido.idordenpedido_id }}"
                            {% if selected_pedido_id == pedido.idpedido|stringformat:'s' %}selected{% endif %}
                        >
                            Pedido {{ pedido.idpedido }} - {{ pedido.idmodelo.folio }} - {{ pedido.color }}
                        </option>
                    {% endfor %}
                </select>
            </div>

            <button type="submit" class="login-nav forms">Guardar Empaquetado</button>
        </form>

        {% if mensaje_error %}
            <div class="alert alert-error">{{ mensaje_error }}</div>
        {% endif %}

        {% if mensaje_exito %}
            <div class="alert alert-success">{{ mensaje_exito }}</div>
        {% endif %}
    </section>
</main>

<script>
  (function () {
    var ordenSelect = document.getElementById('orden_id');
    var pedidoSelect = document.getElementById('pedido_id');

    if (!ordenSelect || !pedidoSelect) return;

    function filtrarPedidos() {
      var ordenId = ordenSelect.value;
      var opciones = pedidoSelect.querySelectorAll('option');
      var pedidoActual = pedidoSelect.value;
      var pedidoVisible = false;

      opciones.forEach(function (opt, idx) {
        if (idx === 0) {
          opt.hidden = false;
          return;
        }
        var pertenece = String(opt.getAttribute('data-orden')) === String(ordenId);
        opt.hidden = !pertenece;
        if (pertenece && String(opt.value) === String(pedidoActual)) {
          pedidoVisible = true;
        }
      });

      if (!pedidoVisible) {
        pedidoSelect.value = '';
      }
    }

    ordenSelect.addEventListener('change', filtrarPedidos);
    document.addEventListener('DOMContentLoaded', filtrarPedidos);
    filtrarPedidos();
  })();
</script>

</body>
